<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Engagement Invitation</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;

background-image:url("https://images.unsplash.com/photo-1523438885200-e635ba2c371e");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

.card{
position:relative;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:50px;
border-radius:20px;
width:90%;
max-width:600px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:fade 2s ease;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.names{
font-size:38px;
color:#ffd700;
margin:15px 0;
}

.details{
font-size:22px;
margin-top:20px;
}

#countdown{
margin-top:30px;
font-size:26px;
font-weight:bold;
color:#ffd700;
}

button{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:25px;
font-size:18px;
background:#ffd700;
cursor:pointer;
}

button:hover{
background:white;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="card">

<h1>💍 Engagement Invitation 💍</h1>

<div class="names">
Palkesh ❤️ Jaya
</div>

<div class="details">

We are delighted to invite you to celebrate our engagement.<br><br>

📅 <b>26 April 2026</b><br>
⏰ <b>4:00 PM</b><br>
📍 <b>Vindhya Bhawan, Katanga Crossing, TV Tower, Jabalpur, Madhya Pradesh</b>

</div>

<div id="countdown"></div>

<button onclick="window.open('https://maps.app.goo.gl/U3DJgWWmBhGmPaG56')">
View Location
</button>

</div>

<script>

var date = new Date("April 26, 2026 16:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var diff = date - now;

var d = Math.floor(diff/(1000*60*60*24));
var h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var m = Math.floor((diff%(1000*60*60))/(1000*60));
var s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"⏳ " + d + "d " + h + "h " + m + "m " + s + "s";

if(diff < 0){
clearInterval(x);
document.getElementById("countdown").innerHTML =
"🎉 Celebration Started!";
}

},1000);

</script>

</body>
</html>
